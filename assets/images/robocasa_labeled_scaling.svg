<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" role="img" aria-labelledby="title desc">
  <title id="title">Action-labeled data scaling on RoboCasa</title>
  <desc id="desc">Line chart comparing Base Policy and WALA when both use the same amount of action-labeled RoboCasa demonstrations.</desc>
  <defs>
    <filter id="softShadow" x="-8%" y="-8%" width="116%" height="124%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#132033" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="labeledGain" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#1f9d75" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#1f9d75" stop-opacity="0.03"/>
    </linearGradient>
  </defs>

  <rect width="720" height="520" fill="#ffffff"/>
  <rect x="28" y="24" width="664" height="470" rx="18" fill="#fbfdff" stroke="#dfe4ec" filter="url(#softShadow)"/>

  <g font-family="Inter, Arial, sans-serif">
    <text x="58" y="63" fill="#13151a" font-size="22" font-weight="820">
      Action-labeled data scaling
    </text>
    <text x="58" y="90" fill="#5d6572" font-size="13.5">
      Same labeled demonstrations.
    </text>

    <g transform="translate(412 48)">
      <rect x="0" y="0" width="240" height="64" rx="14" fill="#ffffff" stroke="#dfe4ec"/>
      <line x1="20" y1="22" x2="58" y2="22" stroke="#1f9d75" stroke-width="4.8" stroke-linecap="round"/>
      <circle cx="39" cy="22" r="7" fill="#ffffff" stroke="#1f9d75" stroke-width="3"/>
      <text x="74" y="27" fill="#126d52" font-size="13.5" font-weight="820">WALA</text>
      <line x1="20" y1="44" x2="58" y2="44" stroke="#7e8794" stroke-width="4.2" stroke-linecap="round"/>
      <circle cx="39" cy="44" r="6.5" fill="#ffffff" stroke="#7e8794" stroke-width="2.8"/>
      <text x="74" y="49" fill="#5d6572" font-size="13.5" font-weight="760">Base Policy</text>
    </g>

    <rect x="100" y="132" width="540" height="250" rx="11" fill="#ffffff" stroke="#edf1f6"/>
    <g stroke="#dfe6ef" stroke-width="1">
      <line x1="100" y1="132" x2="640" y2="132"/>
      <line x1="100" y1="194.5" x2="640" y2="194.5"/>
      <line x1="100" y1="257" x2="640" y2="257"/>
      <line x1="100" y1="319.5" x2="640" y2="319.5"/>
      <line x1="100" y1="382" x2="640" y2="382"/>
    </g>
    <line x1="100" y1="382" x2="640" y2="382" stroke="#aeb8c5" stroke-width="1.4"/>
    <line x1="100" y1="132" x2="100" y2="382" stroke="#aeb8c5" stroke-width="1.4"/>

    <g fill="#687282" font-size="12.5">
      <text x="76" y="136" text-anchor="end">80</text>
      <text x="76" y="198.5" text-anchor="end">60</text>
      <text x="76" y="261" text-anchor="end">40</text>
      <text x="76" y="323.5" text-anchor="end">20</text>
      <text x="76" y="386" text-anchor="end">0</text>
    </g>
    <text x="52" y="257" transform="rotate(-90 52 257)" fill="#5d6572" font-size="13.5" font-weight="720">Success rate (%)</text>

    <path d="M 100 213.6 L 280 174.2 L 460 159.5 L 640 147 L 640 212.6 L 460 229.2 L 280 254.8 L 100 325.4 Z" fill="url(#labeledGain)"/>
    <path d="M 100 325.4 L 280 254.8 L 460 229.2 L 640 212.6" fill="none" stroke="#7e8794" stroke-width="4.2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 100 213.6 L 280 174.2 L 460 159.5 L 640 147" fill="none" stroke="#1f9d75" stroke-width="4.8" stroke-linecap="round" stroke-linejoin="round"/>

    <g fill="#ffffff" stroke="#7e8794" stroke-width="2.8">
      <circle cx="100" cy="325.4" r="6.8"/>
      <circle cx="280" cy="254.8" r="6.8"/>
      <circle cx="460" cy="229.2" r="6.8"/>
      <circle cx="640" cy="212.6" r="6.8"/>
    </g>
    <g fill="#ffffff" stroke="#1f9d75" stroke-width="3.2">
      <circle cx="100" cy="213.6" r="7.6"/>
      <circle cx="280" cy="174.2" r="7.6"/>
      <circle cx="460" cy="159.5" r="7.6"/>
      <circle cx="640" cy="147" r="7.6"/>
    </g>

    <g fill="#126d52" font-size="13" font-weight="850">
      <text x="100" y="192" text-anchor="middle">53.9</text>
      <text x="280" y="152" text-anchor="middle">66.5</text>
      <text x="460" y="138" text-anchor="middle">71.2</text>
      <text x="640" y="125" text-anchor="middle">75.2</text>
    </g>
    <g fill="#5f6875" font-size="12.5" font-weight="730">
      <text x="100" y="352" text-anchor="middle">18.1</text>
      <text x="280" y="282" text-anchor="middle">40.7</text>
      <text x="460" y="256" text-anchor="middle">48.9</text>
      <text x="640" y="240" text-anchor="middle">54.2</text>
    </g>

    <g fill="#3b4654" font-size="13" font-weight="760">
      <text x="100" y="420" text-anchor="middle">10%</text>
      <text x="280" y="420" text-anchor="middle">40%</text>
      <text x="460" y="420" text-anchor="middle">70%</text>
      <text x="640" y="420" text-anchor="middle">100%</text>
    </g>
    <text x="370" y="455" fill="#4d5968" font-size="13.5" font-weight="760" text-anchor="middle">
      Action-labeled RoboCasa data used
    </text>
  </g>
</svg>
